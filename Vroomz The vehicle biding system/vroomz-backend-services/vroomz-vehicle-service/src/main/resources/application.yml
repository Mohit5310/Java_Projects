server:
  port: 8086

spring:
  application:
    name: VEHICLE-SERVICE
  
  # 🚀 महा-फिक्स: 50MB तक की कड़क हैवी तस्वीरें अपलोड करने के लिए लिमिट बढ़ा दी भाई!
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  
  datasource:
    url: jdbc:mysql://localhost:3306/vroomz_vehicle_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: Mohit@5310
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false  # जो बार-बार पीली वार्निंग आ रही थी, उसे बंद करने के लिए
    properties:
      hibernate:
        format_sql: true  # टर्मिनल में SQL क्वैरी बिल्कुल साफ-साफ दिखेगी

# एक्च्युएटर कॉन्फ़िगरेशन (गेटवे और यूरेका की लाइव हेल्थ चेक करने के लिए)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    preserve-instance-order: true
  instance:
    prefer-ip-address: true