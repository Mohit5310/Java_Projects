server.port=8081
spring.application.name=vroomz-service

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/vroomz_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Mohit@5310
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Multipart limits for car images
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Eureka Discovery
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/